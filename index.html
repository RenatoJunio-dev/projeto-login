<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="media/query.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
</head>
<body>
    <main>

        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a). Faça seu login para acessar sua conta e fazer as configurações no ambiente </p>
                <form action="login.php" method="post" autocomplete="on">

                    <div class="campo">
             <span class="material-icons ">logout</span> 
                         <input type="email" name="login" id="ilogin" placeholder="Seu email" autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login</label>
                    </div>
                   
                   
                   
                   
                   
                    <div class="campo">
                           <span class="material-icons ">lock</span> 
                        
             <input type="password" name="senha" id="isenha" placeholder="*****" autocomplete="current-password" required minlength="6" maxlength="15" >
                   <label for="isenha">Senha</label>

                    </div>
                    <input type="submit" value="Entrar">
                    <a href="#">Esquecia a senha</a>
                </form>

            </div>


        </section>
    </main>

    
</body>
</html>
